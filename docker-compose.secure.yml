version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.secure
    ports:
      - "3000:3000"
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - seccomp:security/seccomp-default.json
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    user: "1001:1001"
    restart: unless-stopped
