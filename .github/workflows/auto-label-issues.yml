name: Auto-Label Issues
on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      scanAll:
        description: "Scan all open issues"
        required: false
        type: boolean
        default: false
permissions:
  issues: write
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Define difficulty labels
            const difficultyLabels = {
              easy: { color: "0E8A16", keywords: ["easy", "beginner", "simple", "入门", "简单", "$10", "$15", "$20", "$25"] },
              medium: { color: "FBCA04", keywords: ["medium", "intermediate", "中等", "$50", "$30"] },
              hard: { color: "F39C12", keywords: ["hard", "difficult", "advanced", "困难", "高级", "$75", "$100"] },
              expert: { color: "B60205", keywords: ["expert", "extreme", "专家", "$150", "$200", "$250", "$500"] }
            };

            // Define area labels
            const areaLabels = {
              web: { color: "1D76DB", keywords: ["web", "xss", "csrf", "ssrf", "http", "cors", "spoof", "injection", "sqli"] },
              blockchain: { color: "5319E7", keywords: ["blockchain", "solidity", "smart contract", "web3", "ether"] },
              cloud: { color: "006B75", keywords: ["cloud", "aws", "k8s", "kubernetes", "docker", "container", "serverless"] },
              crypto: { color: "F9D0C4", keywords: ["crypto", "encryption", "hash", "jwt", "signature", "timing"] },
              ai: { color: "BFD4F2", keywords: ["ai", "llm", "ml", "model", "prompt", "training"] }
            };

            // Ensure labels exist
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }

            // Create difficulty labels
            for (const [name, cfg] of Object.entries(difficultyLabels)) {
              await ensureLabel("difficulty: " + name, cfg.color, name + " difficulty task");
            }
            // Create area labels
            for (const [name, cfg] of Object.entries(areaLabels)) {
              await ensureLabel("area: " + name, cfg.color, name + " security area");
            }

            // Now process issues
            let issues = [];
            if (context.payload.issue) {
              issues = [context.payload.issue];
            } else if (context.payload.inputs && context.payload.inputs.scanAll === "true") {
              const { data: allIssues } = await github.rest.issues.listForRepo({
                owner, repo, state: "open", per_page: 100
              });
              issues = allIssues;
            }

            for (const issue of issues) {
              if (issue.pull_request) continue;
              const text = (issue.title + " " + (issue.body || "")).toLowerCase();
              const newLabels = [];

              // Detect difficulty
              for (const [name, cfg] of Object.entries(difficultyLabels)) {
                if (cfg.keywords.some(k => text.includes(k))) {
                  newLabels.push("difficulty: " + name);
                  break;
                }
              }

              // Detect area
              for (const [name, cfg] of Object.entries(areaLabels)) {
                if (cfg.keywords.some(k => text.includes(k))) {
                  newLabels.push("area: " + name);
                }
              }

              if (newLabels.length > 0) {
                const { data: existing } = await github.rest.issues.listLabelsOnIssue({
                  issue_number: issue.number, owner, repo
                });
                const existingNames = existing.map(l => l.name);

                const toAdd = newLabels.filter(l => !existingNames.includes(l));
                if (toAdd.length > 0) {
                  await github.rest.issues.addLabels({
                    issue_number: issue.number, owner, repo,
                    labels: toAdd
                  });
                  console.log("Labeled #" + issue.number + ": " + toAdd.join(", "));
                }
              }
            }
            console.log("Processed " + issues.length + " issues");
