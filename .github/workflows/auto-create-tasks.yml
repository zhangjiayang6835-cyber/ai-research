name: Auto-Create Hard Tasks

on:
  schedule:
    - cron: "0 2 * * *"   # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:       # 也可手动触发

permissions:
  issues: write
  contents: read

jobs:
  create-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ====== 30 High-Difficulty Security Task Templates ======
            // Rotated by date so each day gets different tasks
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);

            const allTasks = [
              // ── Web Advanced ──
              { title: "[BUG] WebSocket CSRF → Cross-Origin Data Exfiltration $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## WebSocket CSRF 跨源数据泄露

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            WebSocket 端点 \`/ws/realtime\` 缺少 Origin 校验，攻击者可构造恶意页面，利用受害者的已登录会话建立 WebSocket 连接并窃取实时数据流。

            ### 要求
            实现 Origin header 校验 + 服务端 CSRF token 握手。

            ### 复现步骤
            1. 攻击者页面 \`wss://target/ws/realtime\`
            2. 受害者在已登录状态访问该页面
            3. WebSocket 无 Origin 校验 → 数据被窃取

            ### 验收标准
            - [ ] Origin header 白名单校验
            - [ ] 连接前 CSRF challenge-response
            - [ ] 拒绝无效 Origin 时返回 403` },

              // ── Crypto Advanced ──
              { title: "[BUG] Bleichenbacher Oracle in RSA-OAEP Decryption $200",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 200,
                body: `## Bleichenbacher Oracle RSA-OAEP 解密

            **难度**: Expert | **赏金**: $200

            ### 漏洞描述
            RSA-OAEP 解密实现存在 padding oracle：当 ciphertext 解密失败时，服务器返回的报错信息会根据失败类型（padding 无效 / MAC 不匹配）有所区别，形成可被利用的 oracle。

            ### 要求
            实现 constant-time 错误返回，消除 side-channel oracle。

            ### 验收标准
            - [ ] 所有解密失败返回统一错误消息
            - [ ] constant-time 比较操作
            - [ ] 通过 Bleichenbacher 测试向量` },

              // ── Blockchain / Solidity ──
              { title: "[BUG] Reentrancy via ERC-777 Callback in Withdraw Function $180",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 180,
                body: `## ERC-777 回调重入攻击

            **难度**: Expert | **赏金**: $180

            ### 漏洞描述
            \`withdraw()\` 函数在更新余额前调用 \`transfer()\`，若接收方为 ERC-777 合约，则会触发 \`tokensReceived()\` 回调，允许攻击者在余额扣减前递归调用 \`withdraw()\`。

            ### 要求
            使用 Checks-Effects-Interactions 模式 + ReentrancyGuard。

            ### 参考
            - SWC-107
            - The DAO Attack` },

              // ── Cloud / IAM ──
              { title: "[BUG] AWS IAM Privilege Escalation via PassRole + EC2 $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## AWS IAM PassRole 权限提升

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            IAM 策略允许 \`iam:PassRole\` 到 EC2，且附带 \`ec2:RunInstances\`。攻击者可以启动一个拥有高权限 Role 的 EC2 实例，通过 user-data 脚本获取临时凭证，实现权限提升。

            ### 要求
            实施最小权限策略 + PassRole 条件键限制 + 敏感 Role 保护。

            ### 验收标准
            - [ ] PassRole 限定特定 Role 白名单
            - [ ] 移除通配符 Resource
            - [ ] 添加 aws:SourceArn 条件键` },

              // ── OS / Kernel ──
              { title: "[BUG] Race Condition in /tmp File Handling (TOCTOU) $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## /tmp 文件处理的 TOCTOU 条件竞争

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            脚本先检查 \`/tmp/lock\` 不存在，然后创建并写入数据。攻击者可在检查和创建之间替换为符号链接指向 \`/etc/passwd\`，导致任意文件写入。

            ### 要求
            使用 \`O_CREAT | O_EXCL\` 原子操作 + 安全临时目录。

            ### 验收标准
            - [ ] 使用 mkstemp / O_EXCL 原子创建
            - [ ] 设置严格文件权限 (0600)
            - [ ] 验证文件所有者` },

              // ── API Security ──
              { title: "[BUG] JWT Algorithm Confusion (RS256→HS256 Downgrade) $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## JWT Algorithm Confusion (RS256→HS256 降级)

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            JWT 库在验证 token 时会使用 \`alg\` header 指定的算法。攻击者将 \`alg\` 从 \`RS256\` 改为 \`HS256\`，并用已知的 public key 作为 HMAC secret 签名，服务器会接受这个伪造的 token。

            ### 要求
            服务端硬编码允许的算法列表，拒绝非预期算法。

            ### 验收标准
            - [ ] 验证前检查 alg header
            - [ ] 拒绝 HS256 当预期为 RS256
            - [ ] 使用白名单算法列表` },

              // ── SSRF Advanced ──
              { title: "[BUG] Blind SSRF via DNS Rebinding Bypass $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## DNS Rebinding 绕过 SSRF 防护

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            SSRF 防护仅检查首次 DNS 解析结果，攻击者使用 DNS rebinding 技术：第一次解析返回合法 IP（通过白名单），第二次解析指向内网 169.254.169.254（AWS metadata）。

            ### 要求
            实现 DNS TTL 限制 + 响应内容校验 + 禁用 follow redirect。

            ### 验收标准
            - [ ] 对每个请求强制执行 DNS 重新解析
            - [ ] 拒绝私有 IP 范围的响应
            - [ ] 限制重定向次数` },

              // ── Prototype Pollution ──
              { title: "[BUG] Server-Side Prototype Pollution to RCE $200",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 200,
                body: `## 服务端原型链污染 → 远程代码执行

            **难度**: Expert | **赏金**: $200

            ### 漏洞描述
            Express 应用使用 \`lodash.merge\` 合并用户 JSON 输入，攻击者可通过 \`__proto__\` 或 \`constructor.prototype\` 污染全局 Object，进而影响应用逻辑实现 RCE。

            ### 要求
            使用安全的深度合并函数 / 对 JSON 输入进行 sanitize / 使用 Map 替代 Object。

            ### 验收标准
            - [ ] 禁止 \`__proto__\` / \`prototype\` 键
            - [ ] 使用 \`JSON.parse\` + 递归校验
            - [ ] 已测试所有污染向量` },

              // ── GraphQL ──
              { title: "[BUG] GraphQL Batch Query + Rate Limit Bypass $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## GraphQL Batch Query 速率限制绕过

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            GraphQL 端点允许 batch 请求（一次发送多个 query），但速率限制只按 HTTP 请求计数，而非 query 数量。攻击者可在一个请求中发送数百个 query，绕过限制进行数据爬取。

            ### 要求
            实现 query 复杂度分析 + 深度限制 + 按 cost 计费。

            ### 验收标准
            - [ ] 计算每个 query 的复杂度分数
            - [ ] 对 batch 请求聚合计算总成本
            - [ ] 限制最大查询深度` },

              // ── Deserialization ──
              { title: "[BUG] Python Pickle Deserialization RCE via Cache $200",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 200,
                body: `## Pickle 反序列化 RCE（通过缓存系统）

            **难度**: Expert | **赏金**: $200

            ### 漏洞描述
            Redis 缓存中存储了 \`pickle.dumps()\` 序列化的用户 session。攻击者可写入恶意 pickle payload，当服务端 \`pickle.loads()\` 反序列化时触发任意代码执行。

            ### 要求
            替换为 JSON 序列化 / 使用 \`pickle\` 的替代方案 / 加签验证。

            ### 验收标准
            - [ ] 不使用 pickle 处理不可信数据
            - [ ] 或使用 HMAC 签名验证完整性
            - [ ] 缓存数据加签防篡改` },

              // ── NoSQL Injection ──
              { title: "[BUG] MongoDB NoSQL Injection → Authentication Bypass $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## MongoDB NoSQL 注入 → 认证绕过

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            登录接口 JSON body 直接传入 \`db.users.find({username: body.username, password: body.password})\`。攻击者发送 \`{"username": "admin", "password": {"$ne": ""}}\` 绕过认证。

            ### 要求
            使用参数化查询 / ORM / 输入类型校验。

            ### 验收标准
            - [ ] 禁止操作符注入 (\\$ne, \\$gt, \\$where 等)
            - [ ] 输入类型强制为 string
            - [ ] 服务端加盐哈希密码` },

              // ── Race Condition ──
              { title: "[BUG] Race Condition in Distributed Transaction → Double Spend $180",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 180,
                body: `## 分布式事务条件竞争 → 双花攻击

            **难度**: Hard | **赏金**: $180

            ### 漏洞描述
            支付系统的"检查余额→扣款→确认"三步操作非原子执行。攻击者并发发送多个请求，每个请求都通过余额检查，导致余额被多次扣除（变为负数）。

            ### 要求
            使用分布式锁 / 乐观锁 / 事务隔离级别。

            ### 验收标准
            - [ ] 使用数据库事务 + 行级锁
            - [ ] 引入乐观锁版本号
            - [ ] 扣款后检查余额不为负` },

              // ── Log Injection ──
              { title: "[BUG] Log Injection → Log Forging → SIEM Poisoning $120",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 120,
                body: `## 日志注入 → 日志伪造 → SIEM 投毒

            **难度**: Hard | **赏金**: $120

            ### 漏洞描述
            用户输入（username, User-Agent）未经过滤直接写入日志文件。攻击者注入换行符伪造日志条目，污染 SIEM 系统检测逻辑。

            ### 要求
            所有日志输入进行 CRLF 转义 + 日志格式严格校验。

            ### 验收标准
            - [ ] 移除 / 转义 \\r \\n
            - [ ] 结构化日志（JSON 格式）
            - [ ] 引入日志 schema 校验` },

              // ── HTTP Request Smuggling ──
              { title: "[BUG] CL.TE HTTP Request Smuggling → Cache Poisoning $200",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 200,
                body: `## CL.TE HTTP Request Smuggling → 缓存投毒

            **难度**: Expert | **赏金**: $200

            ### 漏洞描述
            前端 nginx 使用 Content-Length，后端使用 Transfer-Encoding: chunked。攻击者构造歧义请求，使前后端解析不一致，导致后续用户请求被劫持并返回恶意内容。

            ### 要求
            统一 HTTP 解析器 / 禁用 HTTP/1.0 downgrade / 使用 HTTP/2。

            ### 验收标准
            - [ ] TE 和 CL 不能同时存在
            - [ ] 拒绝格式错误的 Transfer-Encoding
            - [ ] 使用 HTTP/2 消除歧义` },

              // ── OAuth ──
              { title: "[BUG] OAuth 2.0 CSRF → Account Takeover via State Bypass $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## OAuth 2.0 CSRF → 账户接管（State 绕过）

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            OAuth 回调端点未验证 \`state\` 参数。攻击者构造恶意 OAuth 链接，受害者点击后攻击者的 GitHub 账号绑定到受害者的账户。

            ### 要求
            实现 state 参数 + PKCE + 绑定用户 session。

            ### 验收标准
            - [ ] state 参数 nonce 校验
            - [ ] state 与用户 session 绑定
            - [ ] 启用 PKCE 扩展` },

              // ── XXE ──
              { title: "[BUG] Blind XXE via SVG Upload → SSRF + Data Exfil $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## SVG 上传 Blind XXE → SSRF + 数据外带

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            SVG 文件上传功能未禁用外部实体解析。攻击者可构造包含外部实体的 SVG，通过 OOB (Out-of-Band) 技术将服务器文件外带到攻击者控制的服务器。

            ### 要求
            禁用 XML 外部实体解析 + 白名单标签过滤。

            ### 验收标准
            - [ ] 禁用 DOCTYPE
            - [ ] 禁用外部实体 (\\<!ENTITY)
            - [ ] 限制 SVG 标签白名单` },

              // ── CORS ──
              { title: "[BUG] CORS Misconfiguration + Origin Reflection → Credential Theft $120",
                diff: "easy", tags: ["bug","bounty","security","easy"], bounty: 120,
                body: `## CORS 配置错误 + Origin 反射 → 凭证窃取

            **难度**: Easy | **赏金**: $120

            ### 漏洞描述
            API 响应头 \`Access-Control-Allow-Origin: {Origin}\` 直接反射请求中的 Origin 值，且 \`Access-Control-Allow-Credentials: true\`。任意网站可跨域读取 API 响应。

            ### 要求
            实现 Origin 白名单校验 + 不使用通配符响应。

            ### 验收标准
            - [ ] Origin 白名单校验
            - [ ] 不允许 credentials + 通配符组合
            - [ ] 返回 Vary: Origin 头` },

              // ── Insecure Deserialization Java ──
              { title: "[BUG] Java RMI Deserialization → Remote Code Execution $200",
                diff: "expert", tags: ["bug","bounty","security","expert"], bounty: 200,
                body: `## Java RMI 反序列化 RCE

            **难度**: Expert | **赏金**: $200

            ### 漏洞描述
            Java RMI 端点暴露在公网，攻击者可通过 ysoserial 工具发送精心构造的反序列化 payload，触发 \`Runtime.exec()\`。

            ### 要求
            启用 RMI SSL + 反序列化过滤器（JEP 290）+ 防火墙限制。

            ### 验收标准
            - [ ] 部署 SerialFilter / JEP 290
            - [ ] 限制 RMI 绑定地址
            - [ ] 仅允许白名单类反序列化` },

              // ── LDAP Injection ──
              { title: "[BUG] LDAP Injection → Anonymous Bind Bypass $120",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 120,
                body: `## LDAP 注入 → 匿名绑定绕过

            **难度**: Hard | **赏金**: $120

            ### 漏洞描述
            LDAP 查询直接拼接用户输入：\`(&(uid={input})(userPassword={pwd}))\`。攻击者输入 \`*)(uid=*))\` 使查询变为 \`(&(uid=*)(uid=*))(userPassword=...)\`，绕过密码验证。

            ### 要求
            使用 LDAP 转义库 + 参数化查询。

            ### 验收标准
            - [ ] 转义 RFC 4514 特殊字符
            - [ ] 使用 \\ 转义 \\* ( ) \\0
            - [ ] 不允许空绑定` },

              // ── Zip Slip ──
              { title: "[BUG] Zip Slip → Arbitrary File Write via Archive Extraction $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## Zip Slip → 任意文件写入

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            ZIP 文件解压时未验证文件名是否包含 \`../\`。攻击者构造包含 \`../../etc/cron.d/malicious\` 条目的 ZIP 文件，解压后覆盖系统文件。

            ### 要求
            规范化输出路径 + 拒绝包含路径遍历的条目。

            ### 验收标准
            - [ ] 验证解压路径在目标目录内
            - [ ] 使用 canonical path 校验
            - [ ] 跳过 / 拒绝含 .. 的条目` },

              // ── Session Fixation ──
              { title: "[BUG] Session Fixation + Session ID in URL $120",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 120,
                body: `## Session Fixation + URL 中的 Session ID

            **难度**: Hard | **赏金**: $120

            ### 漏洞描述
            应用在 URL 参数中接受 session ID（\`?sessionid=xyz\`），且登录后不重新生成 session。攻击者可先获取一个 session ID，诱骗受害者使用该 ID 登录，然后攻击者共享同一 session。

            ### 要求
            登录后重新生成 session ID + 仅通过 cookie 传递 session。

            ### 验收标准
            - [ ] 登录成功后 session 重新生成
            - [ ] 拒绝 URL 参数中的 session ID
            - [ ] 设置 Secure + HttpOnly cookie` },

              // ── Insecure Direct Object Reference ──
              { title: "[BUG] IDOR in GraphQL Nested Query → Mass Data Leak $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## GraphQL 嵌套查询中的 IDOR → 批量数据泄露

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            GraphQL 查询 \`user(id: 123) { orders { items { price } } }\` 未校验当前用户是否有权访问该用户的订单数据。攻击者可遍历 user ID 获取所有用户的订单信息。

            ### 要求
            实现 DataLoader 级别的权限校验。

            ### 验收标准
            - [ ] 每个 resolver 都校验数据所有权
            - [ ] 使用 auth context 而非客户端 ID
            - [ ] 限制查询速率` },

              // ── Cache Poisoning ──
              { title: "[BUG] Web Cache Poisoning via Unkeyed Header $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## Web 缓存投毒（Unkeyed Header）

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            CDN/反向代理将 \`X-Forwarded-Host\` 作为缓存键的一部分，但未将其纳入缓存键计算。攻击者设置恶意 \`X-Forwarded-Host\` 使 CDN 缓存包含恶意 JS 的页面，分发给所有用户。

            ### 要求
            缓存键包含所有影响响应的 header + 清理用户可控的 header。

            ### 验收标准
            - [ ] 检查所有 HTTP header 对缓存的影响
            - [ ] 规范化 Vary 响应头
            - [ ] 禁用非标准 header 回源` },

              // ── Command Injection ──
              { title: "[BUG] Blind Command Injection via Email Header $150",
                diff: "hard", tags: ["bug","bounty","security","hard"], bounty: 150,
                body: `## SMTP Header 注入 → 盲命令注入

            **难度**: Hard | **赏金**: $150

            ### 漏洞描述
            邮件发送功能将用户输入的 Subject 直接传给 \`sendmail\`：\`sendmail -s "{subject}" {email}\`。攻击者在 Subject 中注入 \`;id > /tmp/out\` 执行任意命令。

            ### 要求
            使用邮件库 API 而非 shell 命令 + 输入 sanitize。

            ### 验收标准
            - [ ] 禁用 shell 调用
            - [ ] 使用 SMTP library 的 setSubject() API
            - [ ] 转义 shell 特殊字符` },

              // ── Host Header Injection ──
              { title: "[BUG] Host Header Injection → Password Reset Poisoning $120",
                diff: "easy", tags: ["bug","bounty","security","easy"], bounty: 120,
                body: `## Host Header 注入 → 密码重置投毒

            **难度**: Easy | **赏金**: $120

            ### 漏洞描述
            密码重置链接使用请求中的 \`Host\` header 生成：\`https://{Host}/reset?token=xyz\`。攻击者设置恶意 \`Host: attacker.com\`，用户收到的重置链接指向钓鱼网站。

            ### 要求
            使用服务器的规范主机名而非用户提供的 Host header。

            ### 验收标准
            - [ ] 配置中指定可信任的 Host 列表
            - [ ] 验证 Host header 在白名单中
            - [ ] 所有链接使用绝对 URL + 可信任域名` },

              // ── Mass Assignment ──
              { title: "[BUG] Mass Assignment in User Profile Update → Privilege Escalation $120",
                diff: "medium", tags: ["bug","bounty","security","medium"], bounty: 120,
                body: `## Mass Assignment → 权限提升

