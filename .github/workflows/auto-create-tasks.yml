name: Auto-Create Hard Tasks

on:
  schedule:
    - cron: "0 2 * * *"   # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:
    inputs:
      target_count:
        description: Target number of open bounty tasks
        required: false
        default: "35"

permissions:
  issues: write
  contents: read

jobs:
  balance-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Balance Tasks
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const TARGET = parseInt("${{ github.event.inputs.target_count || 35 }}");
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);

            // Load task templates from file
            const allTasks = JSON.parse(fs.readFileSync("task_templates.json", "utf-8"));
            console.log("Loaded " + allTasks.length + " task templates");

            // Step 1: Count current open bounty tasks
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "bounty", per_page: 100
            });
            const currentCount = openIssues.length;
            console.log("Current open bounty tasks: " + currentCount + ", Target: " + TARGET);

            // Step 2: Calculate how many to create or close
            const diff = TARGET - currentCount;

            if (diff > 0) {
              const toCreate = Math.min(diff, 30);
              console.log("Creating " + toCreate + " new tasks...");

              // Track titles to avoid duplicates
              const existingTitles = new Set(openIssues.map(i => i.title));

              let created = 0;
              let errors = 0;
              let attempts = 0;
              while (created < toCreate && attempts < toCreate * 2) {
                const idx = (dayOfYear * 30 + attempts) % allTasks.length;
                const task = allTasks[idx];
                attempts++;

                if (existingTitles.has(task.title)) {
                  console.log("  Skipping duplicate: " + task.title.substring(0, 40));
                  continue;
                }

                try {
                  await github.rest.issues.create({
                    owner, repo, title: task.title, body: task.body, labels: task.tags
                  });
                  created++;
                  console.log("  Created: " + task.title.substring(0, 50));
                  await new Promise(r => setTimeout(r, 1000));
                } catch (e) {
                  errors++;
                  console.log("  ERROR: " + e.message);
                  if (e.status === 403) { break; }
                }
              }
              console.log("\nCreated " + created + " tasks, " + errors + " errors");
            } else if (diff < 0) {
              const toClose = Math.min(Math.abs(diff), currentCount);
              console.log("Closing " + toClose + " oldest tasks...");
              const sorted = openIssues.sort((a, b) =>
                new Date(a.created_at) - new Date(b.created_at)
              );
              let closed = 0;
              for (let i = 0; i < toClose; i++) {
                try {
                  await github.rest.issues.update({
                    issue_number: sorted[i].number, owner, repo,
                    state: "closed", state_reason: "not_planned"
                  });
                  closed++;
                  console.log("  Closed #" + sorted[i].number);
                  await new Promise(r => setTimeout(r, 500));
                } catch (e) {
                  console.log("  ERROR: " + e.message);
                }
              }
              console.log("\nClosed " + closed + " old tasks");
            } else {
              console.log("Already at target (" + TARGET + "), nothing to do.");
            }

            console.log("\n✨ 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢贡献！🎉");
