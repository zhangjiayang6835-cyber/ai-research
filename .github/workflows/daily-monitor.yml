name: Daily Monitor

on:
  schedule:
    - cron: '0 1 */3 * *'   # 每3天   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 也可手动触发

permissions:
  issues: write
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repo stats & new issues
        id: status
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Repo info
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const stars = repoInfo.data.stargazers_count;
            const forks = repoInfo.data.forks_count;

            // 2. Latest open issues
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 10, sort: 'created', direction: 'desc'
            });

            // 3. Leaderboard comment
            let leaderboard = '(unavailable)';
            try {
              const lb = await github.rest.issues.getComment({
                owner, repo, comment_id: 4834744003
              });
              leaderboard = lb.data.body.substring(0, 1000);
            } catch (e) {
              leaderboard = '(failed to fetch: ' + e.message + ')';
            }

            // 4. Recent comments
            const comments = await github.rest.issues.listCommentsForRepo({
              owner, repo, per_page: 5, sort: 'created', direction: 'desc'
            });

            // Build report
            const now = new Date().toISOString().slice(0, 10);
            let report = `## 📊 AI训练场 每日报告 (${now})\n\n`;
            report += `### 仓库状态\n- ⭐ Stars: ${stars}\n- 🍴 Forks: ${forks}\n- 🎯 Open Issues: ${repoInfo.data.open_issues_count}\n\n`;

            report += `### 最新 Issues (Top 10)\n`;
            for (const issue of issues.data) {
              const user = issue.user.login;
              report += `- #${issue.number} @${user}: ${issue.title.substring(0, 60)}\n`;
            }

            report += `\n### 排行榜预览\n`;
            report += '```\n' + leaderboard.substring(0, 600) + '\n```\n';

            report += `\n### 最近评论\n`;
            for (const c of comments.data) {
              const iid = c.issue_url.split('/').pop();
              const preview = c.body.replace(/\n/g, ' ').substring(0, 80);
              report += `- #${iid} @${c.user.login}: ${preview}\n`;
            }

            report += `\n---\n*🤖 自动生成 by GitHub Actions*\n`;

            // Store report as output
            core.setOutput('report', report);
            core.setOutput('date', now);

      - name: Create status issue
        uses: actions/github-script@v7
        with:
          script: |
            // Read from step outputs via process.env since Actions replaces inline
            const report = process.env.REPORT;
            const date = process.env.DATE;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-report',
              per_page: 1
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                title: `Daily Report - ${date}`,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Daily Report - ${date}`,
                body: report,
                labels: ['daily-report']
              });
            }
        env:
          REPORT: ${{ steps.status.outputs.report }}
          DATE: ${{ steps.status.outputs.date }}
