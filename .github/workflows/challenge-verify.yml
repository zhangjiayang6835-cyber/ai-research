name: Challenge Verification
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  pull-requests: write
  checks: write
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Test Environment
        run: |
          pip install --quiet pytest requests flake8 2>/dev/null || true

      - name: Verify Fix
        id: verify
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNum = pr.number;

            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: prNum
            });

            let results = [];
            let hasTest = false;

            for (const file of files) {
              const filename = file.filename;
              const patch = file.patch || "";
              const status = file.status;

              // Check if tests exist
              if (/test|spec|__tests__/i.test(filename)) {
                hasTest = true;
              }

              // Check what vulnerability type this PR addresses
              const title = pr.title.toLowerCase();
              let vulnType = "unknown";
              if (title.includes("ssrf")) vulnType = "ssrf";
              else if (title.includes("sqli") || title.includes("sql")) vulnType = "sqli";
              else if (title.includes("xss")) vulnType = "xss";
              else if (title.includes("rce") || title.includes("remote code")) vulnType = "rce";
              else if (title.includes("pickle")) vulnType = "pickle";
              else if (title.includes("escape") || title.includes("container")) vulnType = "escape";
              else if (title.includes("spoof")) vulnType = "spoofing";

              // Analyze the fix
              const addedLines = patch.split("
            ").filter(l => l.startsWith("+") && !l.startsWith("+++"));
              const removedLines = patch.split("
            ").filter(l => l.startsWith("-") && !l.startsWith("---"));

              // Check for common fix patterns
              const hasInputValidation = patch.some(l => /validate|sanitize|escape|strip/i.test(l));
              const hasAuthCheck = patch.some(l => /auth|permission|role|access.*control/i.test(l));
              const hasBoundsCheck = patch.some(l => /limit|max|check|bound|verify/i.test(l));

              results.push({
                file: filename,
                status: status,
                additions: addedLines.length,
                deletions: removedLines.length,
                hasValidation: hasInputValidation,
                hasAuthCheck: hasAuthCheck,
                vulnType: vulnType
              });
            }

            // Generate verification report
            let report = "## 🔬 挑战验证报告\n\n";
            report += "| 检查项 | 结果 |\n|:-----:|:----:|\n";

            // Check 1: Has code changes
            const hasChanges = files.some(f => f.status !== "removed");
            report += "| ✅ 代码变更 | " + (hasChanges ? "通过" : "❌ 失败 - 无代码变更") + " |\n";

            // Check 2: Has test (if applicable)
            report += "| 🧪 测试文件 | " + (hasTest ? "✅ 有" : "⚠️ 无") + " |\n";

            // Check 3: Fix looks legitimate
            const totalAdditions = files.reduce((s, f) => s + f.additions, 0);
            const fixReason = totalAdditions > 0 ? "✅ 有实质修复 (" + totalAdditions + " 行)" : "❌ 无实质代码添加";
            report += "| 🛠️ 修复内容 | " + fixReason + " |\n";

            // Check 4: Vulnerability type identified
            const types = [...new Set(results.map(r => r.vulnType))];
            report += "| 🎯 漏洞类型 | " + types.join(", ") + " |\n";

            // Specific checks based on vulnerability type
            if (types.includes("ssrf")) {
              report += "| 🔒 SSRF防护 | " + (results.some(r => r.hasValidation) ? "✅ 有输入验证" : "⚠️ 建议增加URL验证") + " |\n";
            }
            if (types.includes("sqli")) {
              report += "| 🔒 SQL注入防护 | 请确认使用参数化查询而非字符串拼接 |\n";
            }
            if (types.includes("rce")) {
              report += "| 🔒 RCE防护 | " + (results.some(r => r.hasBoundsCheck) ? "✅ 有安全检查" : "⚠️ 建议增加执行限制") + " |\n";
            }

            // Check files that should NOT be modified
            const sensitiveFiles = files.filter(f =>
              /\.env|password|secret|credential|token/i.test(f.filename)
            );
            if (sensitiveFiles.length > 0) {
              report += "| ⛔ 敏感文件 | ❌ 修改了敏感文件: " + sensitiveFiles.map(f => f.filename).join(", ") + " |\n";
            }

            report += "\n| **综合判定** | **" + (totalAdditions > 0 ? "✅ 待合并审核" : "❌ 需要修改") + "** |\n";

            report += "\n---\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。\n";

            // Post the verification report
            await github.rest.issues.createComment({
              issue_number: prNum, owner, repo, body: report
            });
            console.log("Challenge verification complete for PR #" + prNum);
            console.log("💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢贡献！🎉");
