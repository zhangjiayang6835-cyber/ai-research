name: Auto Close Cheat PR

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-close:
    if: github.event.label.name == '"'"'cheat-detected'"'"'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log("Not a PR event, skipping");
              return;
            }
            const prNum = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.issues.update({
              issue_number: prNum, owner, repo, state: "closed"
            });
            await github.rest.issues.createComment({
              issue_number: prNum, owner, repo,
              body: "## PR auto-closed\n\nCheat/automation detected.\n\n> Virtual tokens for learning ranking only."
            });
            console.log("PR #" + prNum + ": closed");
