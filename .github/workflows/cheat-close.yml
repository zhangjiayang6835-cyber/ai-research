name: Auto Close Cheat PR

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr || !context.payload.label) {
              console.log("Not a PR labeled event, skipping");
              return;
            }
            const labelName = context.payload.label.name;
            if (labelName !== "cheat-detected") {
              console.log("Label is " + labelName + ", not cheat-detected, skipping");
              return;
            }
            const prNum = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.issues.update({
              issue_number: prNum, owner, repo, state: "closed"
            });
            await github.rest.issues.createComment({
              issue_number: prNum, owner, repo,
              body: "## PR auto-closed\n\nCheat/automation detected.\n\n> Virtual tokens for learning ranking only."
            });
            console.log("PR #" + prNum + ": closed");
