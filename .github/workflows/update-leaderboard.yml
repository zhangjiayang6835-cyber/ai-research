name: Update Leaderboard

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00   # 每 6 小时
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate leaderboard
        run: |
          python scripts/leaderboard.py --all
          echo "Leaderboard regenerated"

      - name: Commit and push
        run: |
          git config user.name "honeycode-bot"
          git config user.email "bot@honeycode-honeypot.dev"
          git add LEADERBOARD.md docs/leaderboard.svg docs/leaderboard.json
          git commit -m "chore: auto-update leaderboard" || echo "Nothing to commit"
          git pull --rebase origin master || true
          git push

      - name: Update leaderboard Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/update_leaderboard.py --issue-number 650 || true
