name: Auto-Merge Clean PRs

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  auto-merge:
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'approved') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = github.event_name === 'pull_request'
              ? context.payload.pull_request
              : context.payload.pull_request;

            const prNum = pr.number;
            const author = pr.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip admin PRs
            if (author === owner) {
              console.log('Admin PR, skipping auto-merge');
              return;
            }

            // Get PR status - check if it has 'approved' label AND no 'cheat-detected' label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              issue_number: prNum, owner, repo
            });
            const labelNames = labels.map(l => l.name);
            const hasApproved = labelNames.includes('approved');
            const hasCheat = labelNames.includes('cheat-detected');
            const hasHighScore = labelNames.includes('high-score');

            if (!hasApproved) {
              console.log(`PR #${prNum}: not approved yet (labels: ${labelNames.join(', ')})`);
              return;
            }
            if (hasCheat) {
              console.log(`PR #${prNum}: cheat detected, manual review required`);
              await github.rest.issues.createComment({
                issue_number: prNum, owner, repo,
                body: `⛔ 自动合并已拒绝：检测到作弊标记，需要人工审核。`
              });
              return;
            }

            // Enable auto-merge
            try {
              await github.rest.pulls.createReviewRequest({
                owner, repo,
                pull_number: prNum,
                reviewers: [owner]
              });
              console.log(`PR #${prNum}: admin review requested`);
            } catch (e) {
              // If that fails, just merge directly
              console.log(`Direct merge: ${e.message}`);
            }

            // Update status
            await github.rest.issues.createComment({
              issue_number: prNum, owner, repo,
              body: `✅ 审核通过，PR 已排队等待自动合并。\n${hasHighScore ? '🏆 高质量提交！' : ''}`
            });
