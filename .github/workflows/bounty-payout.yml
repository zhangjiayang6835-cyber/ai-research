name: Bounty Payout

on:
  workflow_dispatch:
    inputs:
      user:
        description: "提现用户 (留空=全部)"
        required: false
        default: ""

permissions:
  issues: write
  contents: write

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate Payouts
        id: pay
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ledgerFile = 'BOUNTY_LEDGER.json';

            if (!fs.existsSync(ledgerFile)) {
              console.log('No BOUNTY_LEDGER.json found, creating empty ledger');
              fs.writeFileSync(ledgerFile, JSON.stringify({}));
            }

            const ledger = JSON.parse(fs.readFileSync(ledgerFile, 'utf-8'));
            const requestUser = '${{ github.event.inputs.user }}'.trim();

            let report = `## 💰 Bounty 排行榜 & 代币发放\n\n`;
            report += `| 排名 | 参与者 | 总收入 | 提交数 | 最高分 |\n`;
            report += `|:----:|:------:|:-----:|:------:|:-----:|\n`;

            const sorted = Object.entries(ledger)
              .filter(([user]) => !requestUser || user === requestUser)
              .sort((a, b) => b[1].total - a[1].total);

            const medals = ['🥇', '🥈', '🥉'];
            for (let i = 0; i < sorted.length; i++) {
              const [user, data] = sorted[i];
              const rank = medals[i] || `#${i + 1}`;
              const maxScore = Math.max(...data.submissions.map(s => s.score));
              report += `| ${rank} | @${user} | **$${data.total}** | ${data.submissions.length} | ${maxScore} |\n`;
            }

            report += `\n### 提现记录\n\n`;
            report += `| 用户 | 金额 | 状态 | 时间 |\n`;
            report += `|:----:|:----:|:----:|:----:|\n`;

            // Mark payouts
            for (const [user, data] of Object.entries(ledger)) {
              if (requestUser && user !== requestUser) continue;
              if (data.total > 0) {
                // Generate payout record
                const payoutId = `PAY-${Date.now()}-${user}`;
                const payoutRecord = {
                  user: user,
                  amount: data.total,
                  submissions: data.submissions.length,
                  status: 'pending_approval',
                  payoutId: payoutId,
                  requestedAt: new Date().toISOString()
                };

                report += `| @${user} | **$${data.total}** | ⏳ 待批准 | ${payoutId} |\n`;

                // Save individual payout manifest
                fs.writeFileSync(
                  `payout_${user}_${Date.now()}.json`,
                  JSON.stringify(payoutRecord, null, 2)
                );
              }
            }

            report += `\n---\n*🤖 Bounty 系统自动生成*\n`;

            // Update the bounty leaderboard issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bounty-board',
              per_page: 1
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                issue_number: issues[0].number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🏆 Bounty 排行榜 (更新于 ${new Date().toISOString().slice(0, 10)})`,
                body: report
              });
              console.log('Bounty board updated');
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🏆 Bounty 排行榜`,
                body: report,
                labels: ['bounty-board']
              });
              console.log('Bounty board created');
            }

            core.setOutput('report', report);
            console.log("💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢贡献！🎉");

      - name: Commit Payout Manifests
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-research.github"
          git add payout_*.json BOUNTY_LEDGER.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "bounty: payout manifests" && git push origin master 2>&1 || git push origin HEAD:master 2>&1 || echo "Push deferred")
