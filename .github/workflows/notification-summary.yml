name: Daily Notification Summary
on:
  schedule:
    - cron: "0 10 * * 0"   # 每周日
  workflow_dispatch:
permissions:
  issues: write
  actions: read
jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dayAgo = new Date(Date.now() - 86400000).toISOString();

            // Get failed runs in last 24h
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 50, status: "completed"
            });

            const recent = runs.workflow_runs.filter(r =>
              r.created_at >= dayAgo
            );
            const failed = recent.filter(r => r.conclusion === "failure");
            const succeeded = recent.filter(r => r.conclusion === "success");

            let body = `## 📊 每日运行摘要

            **报告周期**: ${new Date(dayAgo).toISOString().slice(0, 10)} ~ ${new Date().toISOString().slice(0, 10)}

            | 状态 | 数量 |
            |:----:|:----:|
            | ✅ 成功 | ${succeeded.length} |
            | ❌ 失败 | ${failed.length} |
            | 📊 成功率 | ${recent.length > 0 ? Math.round(succeeded.length / recent.length * 100) : 100}% |

            `;

            if (failed.length > 0) {
              body += "### ❌ 失败详情\\n\\n";
              for (const f of failed) {
                body += "- [" + f.name + "](" + f.html_url + ") - " + f.created_at.slice(0, 19) + "\\n";
              }
            }

            if (succeeded.length > 0) {
              body += "\\n### ✅ 成功运行\\n\\n";
              for (const s of succeeded.slice(0, 10)) {
                body += "- " + s.name + " - " + s.created_at.slice(0, 19) + "\\n";
              }
            }

            body += "\\n---\\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。";

            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "daily-summary", per_page: 1
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                issue_number: existing[0].number, owner, repo,
                title: "📊 每日运行摘要 " + new Date().toISOString().slice(0, 10),
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: "📊 每日运行摘要 " + new Date().toISOString().slice(0, 10),
                body: body,
                labels: ["daily-summary"]
              });
            }
            console.log("Summary: " + succeeded.length + " success, " + failed.length + " failures");
