name: Update Stats Dashboard

on:
  schedule:
    - cron: "0 4 */3 * *"   # 每3天   # UTC 04:00 = 北京 12:00
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect Stats
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require("fs");

            // Collect data from GitHub
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", per_page: 1, labels: "bug"
            });
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: "all", per_page: 1, labels: "bug"
            });
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "all", per_page: 1
            });

            // Count all open issues
            let openCount = repoData.open_issues_count;

            // Read BOUNTY_LEDGER
            let ledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "BOUNTY_LEDGER.json" });
              ledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}

            const totalBounty = Object.values(ledger).reduce((s, u) => s + (u.total || 0), 0);
            const contributorCount = Object.keys(ledger).length;
            const totalSubmissions = Object.values(ledger).reduce((s, u) => s + ((u.submissions || []).length || u.task_count || 0), 0);

            // Build stats JSON
            const stats = {
              updated: new Date().toISOString(),
              stars: repoData.stargazers_count,
              forks: repoData.forks_count,
              openIssues: openCount,
              totalIssues: allIssues.total_count || 0,
              totalPRs: prs.total_count || 0,
              contributors: contributorCount,
              totalBounty: totalBounty,
              totalSubmissions: totalSubmissions,
              avgScore: totalSubmissions > 0 ? Math.round(totalBounty / totalSubmissions) : 0
            };

            // Write to docs/stats.json
            const docsDir = "docs";
            if (!fs.existsSync(docsDir)) fs.mkdirSync(docsDir);
            fs.writeFileSync("docs/stats.json", JSON.stringify(stats, null, 2));

            // Update README badges
            let readme = "";
            if (fs.existsSync("README.md")) {
              readme = fs.readFileSync("README.md", "utf-8");
            } else {
              readme = "# AI Research Platform\n\n";
            }

            const badges = [
              `![Tasks](https://img.shields.io/badge/tasks-${stats.totalIssues}-blue)`,
              `![Contributors](https://img.shields.io/badge/contributors-${stats.contributors}-brightgreen)`,
              `![Bounty](https://img.shields.io/badge/bounty-$${stats.totalBounty}-gold)`,
              `![Submissions](https://img.shields.io/badge/submissions-${stats.totalSubmissions}-orange)`,
              `![Stars](https://img.shields.io/github/stars/${owner}/${repo})`,
              `![Last Updated](https://img.shields.io/badge/updated-${stats.updated.slice(0, 10)}-lightgrey)`,
            ].join("\n");

            // Replace or add badges section
            const badgeSection = `<!-- STATS_BADGES -->\n${badges}\n<!-- STATS_BADGES_END -->`;
            if (readme.includes("STATS_BADGES")) {
              readme = readme.replace(/<!-- STATS_BADGES -->[\s\S]*?<!-- STATS_BADGES_END -->/g, badgeSection);
            } else {
              readme = badgeSection + "\n\n" + readme;
            }

            fs.writeFileSync("README.md", readme);
            console.log("Stats dashboard updated!");

      - name: Commit Stats
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-research.github"
          git add docs/stats.json README.md
          git diff --cached --quiet || (git commit -m "stats: update dashboard" && git pull --rebase origin master && git push origin master)
