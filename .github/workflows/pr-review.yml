name: PR Auto-Review & Score

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: write
  checks: write

jobs:
  review:
    if: github.actor != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze PR Changes
        id: analyze
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNum = pr.number;
            const title = pr.title;
            const baseBranch = pr.base.ref;

            console.log(`PR #${prNum} by @${author}: ${title}`);

            // Get PR diff
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum
            });

            // 1. CHEAT DETECTION on all changed files
            const allFindings = [];
            let totalAdditions = 0;

            for (const file of files) {
              const patch = file.patch || '';
              const filename = file.filename;
              totalAdditions += file.additions;

              // Only analyze python/js files
              if (!/\.(py|js|ts|java|go|rs|cpp|c|php|rb|sh)$/i.test(filename)) continue;
              // Skip test files
              if (/test|spec|__pycache__/.test(filename)) continue;

              // Extract added lines from patch (lines starting with +)
              const addedLines = patch.split('\n')
                .filter(l => l.startsWith('+') && !l.startsWith('+++'))
                .map(l => l.substring(1))
                .join('\n');

              // --- Cheat patterns ---
              const findings = [];

              if (/shell\s*=\s*True/.test(addedLines))
                findings.push({file:filename, name:'shell=True', conf:0.9, desc:'use shell=True'});
              if (/eval\s*\(/.test(addedLines))
                findings.push({file:filename, name:'eval()', conf:0.8, desc:'use eval()'});
              if (/exec\s*\(/.test(addedLines))
                findings.push({file:filename, name:'exec()', conf:0.85, desc:'use exec()'});
              if (/pickle\.loads\s*\(/.test(addedLines))
                findings.push({file:filename, name:'pickle.loads()', conf:0.85, desc:'use pickle.loads()'});
              if (/os\.system\s*\(/.test(addedLines))
                findings.push({file:filename, name:'os.system()', conf:0.8, desc:'use os.system()'});
              if (/is_admin\s*=\s*True/.test(addedLines))
                findings.push({file:filename, name:'is_admin_hardcoded', conf:0.75, desc:'hardcoded admin'});
              if (/subprocess\.call/.test(addedLines))
                findings.push({file:filename, name:'subprocess.call()', conf:0.7, desc:'unsafe subprocess'});
              if (/execute\s*\(\s*f["\u201c]/.test(addedLines))
                findings.push({file:filename, name:'sql_fstring', conf:0.85, desc:'f-string SQL injection'});

              // Hardcoded secrets
              const secretPatterns = [
                /(password|passwd|pwd|secret|api_key|apikey|token)\s*[=:]\s*["'`][^"'{}$]+["'`]/i,
                /(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36,}|AKIA[0-9A-Z]{16})/
              ];
              for (const sp of secretPatterns) {
                const m = addedLines.match(sp);
                if (m) findings.push({file:filename, name:'hardcoded_secret', conf:0.95, desc:'hardcoded credential: ' + m[0].substring(0, 30)});
              }

              // AI patterns in comments
              const commentPatterns = [
                [/Here[']s (a|the|my) (fix|solution|implementation)/i, 'AI_greeting', 0.2],
                [/I[']ll (provide|implement|create|write|add)/i, 'AI_ill_provide', 0.15],
                [/Sure[!,] (here|I)/i, 'AI_sure_here', 0.15],
                [/(Certainly|Absolutely|Of course)[!,]/i, 'AI_certainly', 0.15],
              ];
              for (const [pat, name, weight] of commentPatterns) {
                if (pat.test(addedLines)) findings.push({file:filename, name, conf:weight, desc:'AI pattern: ' + name});
              }

              if (findings.length > 0) {
                console.log(`  ${filename}: ${findings.length} findings`);
                allFindings.push(...findings);
              }
            }

            // 2. EVALUATE
            // Determine difficulty from labels or PR title
            const labels = pr.labels.map(l => l.name.toLowerCase());
            let diff = 'medium';
            for (const d of ['easy','medium','hard','expert']) {
              if (labels.includes(d)) { diff = d; break; }
            }

            // Check title for difficulty clues
            if (/\[hard\]|\[expert\]/i.test(title)) diff = 'hard';
            else if (/\[easy\]/i.test(title)) diff = 'easy';
            else if (/\[medium\]/i.test(title)) diff = 'medium';

            const scoreMap = {easy: 50, medium: 75, hard: 100, expert: 150};
            const baseScore = scoreMap[diff] || 75;

            // Calculate suspicion score
            const suspicion = allFindings.length === 0 ? 0 :
              Math.min(Math.max(...allFindings.map(f => f.conf)), 1);
            const deduction = Math.floor(suspicion * 100);
            const totalScore = Math.max(baseScore - deduction, 0);
            const clean = allFindings.length === 0;

            // 3. BUILD REPORT
            let report = `## 🔍 PR 自动审查报告\n\n`;
            report += `**PR**: #${prNum} — ${title}\n`;
            report += `**提交者**: @${author}\n`;
            report += `**文件变更**: ${files.length} 文件, +${totalAdditions} 行\n`;
            report += `**难度**: ${diff}\n\n`;

            if (clean) {
              report += `### ✅ 审查通过\n\n未检测到可疑模式，代码合规。\n\n`;
            } else {
              report += `### ⚠️ 检测到可疑模式\n\n`;
              report += `| 文件 | 嫌疑项 | 置信度 | 说明 |\n`;
              report += `|:----:|:------:|:------:|:----:|\n`;
              for (const f of allFindings) {
                report += `| ${f.file} | ${f.name} | ${Math.floor(f.conf * 100)}% | ${f.desc} |\n`;
              }
              report += `\n`;
            }

            report += `### 📊 评分\n\n`;
            report += `| 指标 | 值 |\n`;
            report += `|:----:|:--:|\n`;
            report += `| 基础分 | ${baseScore} |\n`;
            report += `| 作弊扣分 | -${deduction} |\n`;
            report += `| **最终得分** | **${totalScore}** |\n`;

            // Check if PR body references a bounty issue
            const body = pr.body || '';
            const bountyMatch = body.match(/(?:fixes|closes|resolve|#)\s*(\d+)/i);
            const targetIssue = bountyMatch ? bountyMatch[1] : 'N/A';

            report += `| 目标 Issue | #${targetIssue} |\n`;
            report += `| **代币奖励** | **$${totalScore}** |\n\n`;

            report += `---\n*🤖 自动审查 by AI Training Bot\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。*\n`;

            
            // 2. QUALITY MULTI-DIMENSION SCORING
            let qualityScore = 100;
            const qualityNotes = [];

            const hasBody = (pr.body || "").length > 20;
            if (!hasBody) { qualityScore -= 15; qualityNotes.push("缺少 PR 描述 (-15)"); }

            const refIssue = (pr.body || "").match(/(?:fix(?:es)?|closes?|resolve|#)\\s*(\d+)/i) || (pr.title || "").match(/#\s*(\d+)/);
            if (!refIssue) { qualityScore -= 10; qualityNotes.push("没有关联 Issue (-10)"); }

            const hasTests = files.some(f => /test|spec|__tests__/i.test(f.filename));
            if (!hasTests) { qualityScore -= 10; qualityNotes.push("没有测试文件 (-10)"); }

            if (totalAdditions < 5) { qualityScore -= 20; qualityNotes.push("改动太少 (<5 行) (-20)"); }
            else if (totalAdditions > 500) { qualityScore -= 10; qualityNotes.push("PR 过大 (>500 行) (-10)"); }

            const meaningful = files.filter(f => !/\.(md|txt|json|yml|yaml|toml|cfg|ini)$/i.test(f.filename));
            if (meaningful.length === 0 && files.length > 0) { qualityScore -= 10; qualityNotes.push("只有配置文件 (-10)"); }

            if (qualityNotes.length > 0) {
              report += "\n### 📋 代码质量\n\n| 检查项 | 扣分 |\n|:-----:|:----:|\n";
              for (const n of qualityNotes) report += "| " + n.replace("(", "| (") + " |\n";
              report += "| **总分** | **" + qualityScore + "/100** |\n\n";
            } else {
              report += "\n### 📋 代码质量\n\n✅ 全部通过 (100/100)\n\n";
            }

            const combinedScore = Math.round((score + qualityScore) / 2);
            report += "**综合评分**: **" + combinedScore + "/100** (安全 " + score + " + 质量 " + qualityScore + ")\n\n";

            if (score >= 80 && qualityScore >= 70 && !hasCheat) {
              if (!labels.includes("auto-reviewed")) {
                await github.rest.issues.addLabels({ issue_number: prNum, owner: context.repo.owner, repo: context.repo.repo, labels: ["auto-reviewed"] });
              }
              if (!labels.includes("approved") && combinedScore >= 75) {
                await github.rest.issues.addLabels({ issue_number: prNum, owner: context.repo.owner, repo: context.repo.repo, labels: ["approved"] });
              }
              report += "\n✅ **自动审核通过** - 代码安全且质量达标\n";
            } else if (hasCheat) {
              report += "\n⛔ **检测到作弊行为** - 人工审核\n";
            } else {
              report += "\n🔍 **需要人工复核** - 安全评分 " + score + "/100，质量评分 " + qualityScore + "/100\n";
            }

// Store results
            core.setOutput('report', report);
            core.setOutput('score', totalScore.toString());
            core.setOutput('clean', clean.toString());
            core.setOutput('findings', JSON.stringify(allFindings));
            core.setOutput('diff', diff);
            core.setOutput('target_issue', targetIssue);

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.analyze.outputs.report }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Add Labels
        uses: actions/github-script@v7
        with:
          script: |
            const clean = '${{ steps.analyze.outputs.clean }}' === 'true';
            const score = parseInt('${{ steps.analyze.outputs.score }}');
            const diff = '${{ steps.analyze.outputs.diff }}';

            const labels = ['auto-reviewed'];
            if (clean) labels.push('approved');
            else labels.push('cheat-detected');
            if (score >= 75) labels.push('high-score');
            else if (score < 25) labels.push('low-score');

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });

      - name: Save Score to Ledger
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const score = parseInt('${{ steps.analyze.outputs.score }}');
            const clean = '${{ steps.analyze.outputs.clean }}' === 'true';
            const diff = '${{ steps.analyze.outputs.diff }}';
            const targetIssue = '${{ steps.analyze.outputs.target_issue }}';

            let ledger = {};
            const ledgerFile = 'BOUNTY_LEDGER.json';
            if (fs.existsSync(ledgerFile)) {
              ledger = JSON.parse(fs.readFileSync(ledgerFile, 'utf-8'));
            }
            if (!ledger[author]) ledger[author] = {total: 0, submissions: [], lastPayout: null};
            ledger[author].total += score;
            ledger[author].submissions.push({
              pr: context.issue.number,
              targetIssue: targetIssue,
              score: score,
              clean: clean,
              difficulty: diff,
              date: new Date().toISOString()
            });
            fs.writeFileSync(ledgerFile, JSON.stringify(ledger, null, 2));
            
            // 4. AI-ENHANCED ANALYSIS
            let aiAnalysis = "### 🤖 AI 增强分析\n\n";

            // Analyze code complexity
            const complexityScore = files.reduce((s, f) => {
              const patch = f.patch || "";
              const addedLines = patch.split("\n").filter(l => l.startsWith("+") && !l.startsWith("+++")).length;
              return s + addedLines;
            }, 0);

            if (complexityScore > 100) {
              aiAnalysis += "- 📏 代码变更量较大 (" + complexityScore + " 行)，建议人工复核关键逻辑\n";
            } else if (complexityScore < 10) {
              aiAnalysis += "- 📏 简洁的修复 (" + complexityScore + " 行)，易于审核\n";
            } else {
              aiAnalysis += "- 📏 适中变更 (" + complexityScore + " 行)，范围可控\n";
            }

            // Analyze file diversity
            const fileTypes = [...new Set(files.map(f => {
              const ext = f.filename.split(".").pop();
              return ext;
            }))];
            aiAnalysis += "- 📁 涉及 " + fileTypes.length + " 种文件类型: " + fileTypes.join(", ") + "\n";

            // Check for documentation changes
            const hasDocs = files.some(f => /\.(md|txt|rst)$/i.test(f.filename));
            if (hasDocs) aiAnalysis += "- 📖 包含文档更新\n";

            // Check for configuration changes
            const hasConfig = files.some(f => /\.(yml|yaml|json|toml|cfg|ini)$/i.test(f.filename));
            if (hasConfig) aiAnalysis += "- ⚙️ 包含配置文件更改\n";

            // Suggest improvements
            const suggestions = [];
            if (totalAdditions < 5 && !files.some(f => /test|spec/i.test(f.filename))) {
              suggestions.push("建议添加测试用例来验证修复的有效性");
            }
            if (files.some(f => /print|console\.log|puts/i.test(f.patch || ""))) {
              suggestions.push("PR 中包含调试输出，请确认是否应保留");
            }
            if (files.length > 5) {
              suggestions.push("变更文件较多(>" + files.length + ")，考虑拆分为多个PR");
            }

            if (suggestions.length > 0) {
              aiAnalysis += "\n#### 💡 改进建议\n\n";
              for (const s of suggestions) {
                aiAnalysis += "- 💬 " + s + "\n";
              }
            }

            report += "\n" + aiAnalysis + "\n";
console.log(`${author}: +${score} (total: ${ledger[author].total})`);

      - name: Commit Ledger
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-research.github"
          git add BOUNTY_LEDGER.json
          git diff --cached --quiet || (git commit -m "bounty: update ledger" && git pull --rebase origin master && git push origin master)
