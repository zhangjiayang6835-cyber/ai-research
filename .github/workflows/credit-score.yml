name: Credit Score System
on:
  pull_request:
    types: [closed]
permissions:
  contents: write
  issues: write
jobs:
  update-credit:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const labels = pr.labels.map(l => l.name);

            // Read or init credit ledger
            let credit = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "CREDIT_SCORE.json" });
              credit = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}

            if (!credit[author]) credit[author] = { score: 0, merged: 0, totalBounty: 0 };

            // Calculate score
            let points = 10; // base for merge
            if (labels.includes("high-score")) points += 5;
            if (labels.includes("cheat-detected")) points -= 20;

            credit[author].score += points;
            credit[author].merged += 1;
            credit[author].lastMerge = new Date().toISOString();

            let creditSha;
            try {
              const { data: cf } = await github.rest.repos.getContent({ owner, repo, path: "CREDIT_SCORE.json" });
              creditSha = cf.sha;
            } catch (e) { creditSha = undefined; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: "CREDIT_SCORE.json",
              message: "chore: update credit score for @" + author,
              content: Buffer.from(JSON.stringify(credit, null, 2)).toString("base64"),
              sha: creditSha
            });
            console.log("Credit score updated for @" + author + ": +" + points + " (total: " + credit[author].score + ")");
