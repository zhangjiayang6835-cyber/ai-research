name: Review Pending PRs

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  batch-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", per_page: 100
            });
            let reviewed = 0;
            for (const pr of prs) {
              const labels = pr.labels.map(l => l.name);
              if (labels.includes("auto-reviewed") || labels.includes("cheat-detected")) continue;
              const spam = pr.user.login === "n4rus" || pr.user.login === "JHON12091986";
              if (spam) {
                await github.rest.issues.addLabels({
                  issue_number: pr.number, owner, repo, labels: ["cheat-detected"]
                });
                reviewed++; continue;
              }
              if (labels.includes("needs-rebase")) continue;
              const age = Date.now() - new Date(pr.created_at).getTime();
              if (age > 3 * 86400000) {
                await github.rest.issues.createComment({
                  issue_number: pr.number, owner, repo,
                  body: "⏰ PR over 3 days old. Auto-closing.\n\n> Virtual tokens for learning ranking only."
                });
                await github.rest.pulls.update({
                  pull_number: pr.number, owner, repo, state: "closed"
                });
                reviewed++; continue;
              }
            }
            console.log("Reviewed " + reviewed + " PRs");
