name: Duplicate PR Detection
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
permissions:
  issues: write
  pull-requests: write
jobs:
  check-dupe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const title = pr.title;
            const body = (pr.body || "");

            // Find issue references in title/body
            const refs = [];
            const matches = title.matchAll(/#(\d+)/g);
            for (const m of matches) refs.push(m[1]);
            const bmatches = body.matchAll(/(?:close|fix|resolve)\s*#(\d+)/gi);
            for (const m of bmatches) refs.push(m[1]);

            if (refs.length === 0) {
              console.log("No issue reference found");
              return;
            }

            // Check for other PRs referencing same issues
            for (const issueNum of [...new Set(refs)]) {
              const { data: otherPRs } = await github.rest.pulls.list({ owner, repo, state: "open" });
              const duplicates = otherPRs.filter(p =>
                p.number !== pr.number &&
                (p.title.includes("#" + issueNum) || (p.body || "").includes("#" + issueNum))
              );

              if (duplicates.length > 0) {
                let msg = "⚠️ **可能的重复PR检测**\\n\\n";
                msg += "这个PR关联 Issue #" + issueNum + "，以下PR也引用了相同 Issue：\\n";
                for (const d of duplicates) {
                  msg += "- [#" + d.number + "](" + d.html_url + ") by @" + d.user.login + "\\n";
                }
                msg += "\\n请确认没有重复工作。如果 Issue 已被修复，请关闭此PR。";
                await github.rest.issues.createComment({
                  issue_number: pr.number, owner, repo, body: msg
                });
                console.log("PR #" + pr.number + ": duplicate warning posted for #" + issueNum);
              }
            }
