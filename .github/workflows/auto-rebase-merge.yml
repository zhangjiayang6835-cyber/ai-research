name: Auto Rebase & Merge

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to rebase and merge
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  rebase-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: pr_info
        with:
          script: |
            let prNum;
            if (context.payload.inputs && context.payload.inputs.pr_number) {
              prNum = parseInt(context.payload.inputs.pr_number);
            } else if (context.payload.pull_request) {
              prNum = context.payload.pull_request.number;
            }
            core.setOutput("pr_number", prNum || "");

      - name: Check mergeability
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt("${{ steps.pr_info.outputs.pr_number }}");
            if (!prNum) { core.setOutput("skip", "true"); return; }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNum
            });
            const p = pr.data;
            if (p.merged || p.state === "closed") {
              console.log("PR #" + prNum + " already merged/closed");
              core.setOutput("skip", "true"); return;
            }
            const labels = p.labels.map(l => l.name);
            if (!labels.includes("auto-rebase")) {
              console.log("PR #" + prNum + " missing auto-rebase label");
              core.setOutput("skip", "true"); return;
            }
            core.setOutput("skip", "false");
            core.setOutput("head_ref", p.head.ref);
            core.setOutput("head_repo", p.head.repo.full_name);
            core.setOutput("is_fork", (p.base.repo.full_name !== p.head.repo.full_name) ? "true" : "false");

      - name: Attempt merge
        id: merge
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          echo "Merging PR #${PR_NUM}..."
          gh pr merge ${PR_NUM} --repo ${{ github.repository }} --squash --subject "fix: auto-merge PR #${PR_NUM}" 2>&1 && echo "merged=true" >> $GITHUB_OUTPUT && exit 0
          echo "gh pr merge failed, trying API..."
          RESULT=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/merge -X PUT -f merge_method="squash" -f commit_title="fix: auto-merge PR #${PR_NUM}" --jq ".message" 2>&1)
          echo "API result: ${RESULT}"
          if echo "${RESULT}" | grep -qi "successful"; then
            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      - name: Remove label
        if: always() && steps.check.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          gh pr edit ${PR_NUM} --repo ${{ github.repository }} --remove-label auto-rebase 2>/dev/null || true
          if [[ "${{ steps.merge.outputs.merged }}" != "true" ]]; then
            gh pr edit ${PR_NUM} --repo ${{ github.repository }} --add-label needs-rebase 2>/dev/null || true
          fi
