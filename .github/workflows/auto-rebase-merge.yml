name: Auto Rebase & Merge

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-rebase-merge:
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-reviewed') &&
      contains(github.event.pull_request.labels.*.name, 'approved')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Auto Rebase
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-training.local"
          git rebase origin/master || true

      - name: Check conflicts
        id: conflicts
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "conflict_files=$(git diff --name-only --diff-filter=U | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          fi

      - name: Try auto-resolve known patterns
        if: steps.conflicts.outputs.has_conflicts == 'true'
        run: |
          git diff --name-only --diff-filter=U | while read f; do
            case "$f" in
              *.py|*.json|*.md|*.yml|*.yaml)
                git checkout --ours "$f" 2>/dev/null || git checkout --theirs "$f" 2>/dev/null || true
                git add "$f"
                ;;
            esac
          done
          git commit --no-edit || true

      - name: Push rebased branch
        run: |
          git push origin HEAD:${{ github.head_ref }} --force-with-lease || echo "Push failed, conflicts remain"

      - name: Merge PR
        id: do_merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.pulls.merge({
                pull_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                merge_method: 'merge',
                commit_title: 'Auto-merge: ' + pr.title
              });
              console.log('PR #' + pr.number + ' merged successfully');
            } catch (e) {
              console.log('Merge failed: ' + e.message);
              // Try enabling auto-merge as fallback
            }
