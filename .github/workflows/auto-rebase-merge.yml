name: Auto Rebase & Merge

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to rebase and merge
        required: false
        type: string

concurrency:
  group: auto-rebase-merge
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  rebase-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: pr_info
        with:
          script: |
            let prNum;
            if (context.payload.inputs && context.payload.inputs.pr_number) {
              prNum = parseInt(context.payload.inputs.pr_number);
            } else if (context.payload.pull_request) {
              prNum = context.payload.pull_request.number;
            }
            core.setOutput("pr_number", prNum);

      - name: Check eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt('${{ steps.pr_info.outputs.pr_number }}');
            if (!prNum) { core.setOutput("skip", "true"); return; }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNum
            });
            if (pr.data.merged || pr.data.state === "closed") {
              core.setOutput("skip", "true"); return;
            }
            const labels = pr.data.labels.map(l => l.name);
            const ok = labels.includes("auto-rebase") || (labels.includes("auto-reviewed") && labels.includes("approved"));
            if (!ok) { core.setOutput("skip", "true"); return; }
            core.setOutput("skip", "false");
            core.setOutput("head_ref", pr.data.head.ref);

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.pr_info.outputs.pr_number }}/head

      - name: Git setup
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-training.local"

      - name: Fetch latest master and rebase
        id: rebase
        if: steps.check.outputs.skip != 'true'
        run: |
          git fetch origin master
          git fetch origin +refs/heads/master:refs/remotes/origin/master
          if git rebase origin/master; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-resolve conflicts
        if: steps.rebase.outputs.success == 'false'
        run: |
          for f in $(git diff --name-only --diff-filter=U); do
            case "$f" in
              *.py|*.json|*.md|*.yml|*.yaml|*.txt)
                git checkout --theirs "$f" 2>/dev/null || git checkout --ours "$f" 2>/dev/null || true
                git add "$f" 2>/dev/null || true
                echo "Resolved: $f" ;;
            esac
          done
          git commit --no-edit 2>/dev/null || true

      - name: Push rebased branch
        if: steps.check.outputs.skip != 'true'
        run: |
          BRANCH="${{ steps.check.outputs.head_ref }}"
          git push origin HEAD:refs/heads/${BRANCH} --force 2>&1 || echo "Push failed"

      - name: Wait for GitHub to process
        if: steps.check.outputs.skip != 'true'
        run: sleep 10

      - name: Remove auto-rebase label
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          gh pr edit ${PR_NUM} --repo ${{ github.repository }} --remove-label auto-rebase 2>/dev/null || true

      - name: Merge via API
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          # Try PR merge first
          gh pr merge ${PR_NUM} --repo ${{ github.repository }} --merge --subject "Auto-merge: fix #${PR_NUM}" 2>&1 && exit 0
          # Fallback: try direct branch merge via API
          BRANCH="${{ steps.check.outputs.head_ref }}"
          echo "PR merge failed, trying direct branch merge..."
          gh api repos/${{ github.repository }}/merges -X POST \
            -f base=master \
            -f head=${BRANCH} \
            -f commit_message="Merge PR #${PR_NUM}: auto-merged" 2>&1 || echo "Direct merge also failed"

      - name: Success comment
        if: success() && steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt('${{ steps.pr_info.outputs.pr_number }}');
            await github.rest.issues.createComment({
              issue_number: prNum, owner: context.repo.owner, repo: context.repo.repo,
              body: "✅ Auto rebase and merge successful!\n\n> Virtual tokens for learning ranking only, not redeemable for cash or crypto. Thanks for your contribution!"
            });

      - name: Failure comment
        if: failure() && steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt('${{ steps.pr_info.outputs.pr_number }}');
            await github.rest.issues.createComment({
              issue_number: prNum, owner: context.repo.owner, repo: context.repo.repo,
              body: "❌ Auto rebase failed, manual conflict resolution needed.\n\n> Virtual tokens for learning ranking only, not redeemable for cash or crypto."
            });
